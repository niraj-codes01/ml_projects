
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Exam Performance Predictor</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4f46e5, #2563eb);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 850px;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .25);
        }

        .title {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #e5e7eb;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            color: white;
            margin-bottom: 8px;
            font-weight: 600;
        }

        select,
        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 15px;
        }

        select:focus,
        input:focus {
            box-shadow: 0 0 12px rgba(255, 255, 255, .6);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: white;
            color: #2563eb;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .result {
            margin-top: 25px;
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }

        .result h2 {
            color: #2563eb;
            margin-bottom: 10px;
        }

        .score {
            font-size: 42px;
            font-weight: bold;
            color: #16a34a;
        }

        .footer {
            text-align: center;
            color: #dbeafe;
            margin-top: 20px;
            font-size: 14px;
        }

        @media(max-width:768px) {
            .card {
                padding: 20px;
            }

            .title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">

            <h1 class="title">
                <i class="fas fa-graduation-cap"></i>
                Student Exam Performance Predictor
            </h1>

            <p class="subtitle">
                Predict Mathematics Score using Machine Learning
            </p>

            <form action="{{ url_for('predict_datapoint') }}" method="post">

                <div class="form-group">
                    <label><i class="fas fa-user"></i> Gender</label>
                    <select name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-users"></i> Race / Ethnicity</label>
                    <select name="race_ethnicity" required>
                        <option value="">Select Ethnicity</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-school"></i> Parental Education</label>
                    <select name="parental_level_of_education" required>
                        <option value="">Select Parent Education</option>
                        <option value="associate's degree">Associate's Degree</option>
                        <option value="bachelor's degree">Bachelor's Degree</option>
                        <option value="high school">High School</option>
                        <option value="master's degree">Master's Degree</option>
                        <option value="some college">Some College</option>
                        <option value="some high school">Some High School</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-utensils"></i> Lunch Type</label>
                    <select name="lunch" required>
                        <option value="">Select Lunch Type</option>
                        <option value="standard">Standard</option>
                        <option value="free/reduced">Free / Reduced</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-book"></i> Test Preparation Course</label>
                    <select name="test_preparation_course" required>
                        <option value="">Select Course Status</option>
                        <option value="none">None</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-book-reader"></i> Reading Score</label>
                    <input type="number" name="reading_score"
                        min="0" max="100"
                        placeholder="Enter Reading Score" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-pen"></i> Writing Score</label>
                    <input type="number" name="writing_score"
                        min="0" max="100"
                        placeholder="Enter Writing Score" required>
                </div>

                <button class="btn" type="submit">
                    <i class="fas fa-chart-line"></i>
                    Predict Maths Score
                </button>

            </form>

            {% if results %}
            <div class="result">
                <h2>
                    <i class="fas fa-trophy"></i>
                    Predicted Mathematics Score
                </h2>

                <div class="score">
                    {{ results }}
                </div>
            </div>
            {% endif %}

            <div class="footer">
                <i class="fas fa-code"></i>
                Built with Flask • Scikit-Learn • Machine Learning
            </div>

        </div>

    </div>

</body>

</html>
